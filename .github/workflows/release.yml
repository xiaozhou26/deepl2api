name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Linux amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare binary
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-gnu/release/deepl2api artifacts/
          cp README.md API.md CLAUDE.md artifacts/

      - name: Create archive
        run: |
          cd artifacts
          tar czf ../deepl2api-linux-amd64.tar.gz deepl2api README.md API.md CLAUDE.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            deepl2api-linux-amd64.tar.gz
