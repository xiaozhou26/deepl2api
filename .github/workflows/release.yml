name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Linux amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare binary
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-gnu/release/deepl2api artifacts/

      - name: Create archive
        run: |
          cd artifacts
          tar czf ../deepl2api-linux-amd64.tar.gz deepl2api

      - name: Generate release notes
        id: generate_notes
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' > release_notes.md || {
            echo "API release notes failed, using git log fallback..."
            echo "## What's Changed" > release_notes.md
            git log "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)"..HEAD --oneline --format="* %s (%h)" >> release_notes.md
          }

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            "deepl2api-linux-amd64.tar.gz"
